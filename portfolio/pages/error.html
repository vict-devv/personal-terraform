<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Victor Ferreira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #0f172a;
        color: #f8fafc;
      }
      .gradient-text {
        background: linear-gradient(90deg, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body
    class="font-sans antialiased flex items-center justify-center min-h-screen"
  >
    <div class="max-w-md w-full px-6 text-center">
      <h1 class="text-9xl font-extrabold gradient-text mb-4">404</h1>
      <h2 class="text-2xl font-bold mb-6 text-slate-100">
        Deployment Error? Not quite.
      </h2>
      <p class="text-slate-400 mb-8 leading-relaxed">
        The page you are looking for has been decommissioned or moved to a
        different environment.
      </p>
      <a
        href="index.html"
        class="inline-block px-8 py-3 bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold rounded-lg transition-colors"
      >
        Return to Cluster (Home)
      </a>
      <div class="mt-12 pt-8 border-t border-slate-800">
        <p class="text-xs text-slate-500 font-mono">
          Status: Resource_Not_Found
        </p>
      </div>
    </div>
  </body>
</html>
